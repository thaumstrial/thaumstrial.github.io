<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Thaumstrial DB</title>

        <script>
            function loadNav() {
                fetch("nav.html")
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById("navbar").innerHTML = html;
                    });
            }
        </script>
    </head>
    <body onload="loadNav()">
        <div id="navbar"></div>

        <p>欢迎来到 Thaumstrial DB，很高兴在茫茫互联网海洋中遇见你！🤝</p>
    </body>
</html>
